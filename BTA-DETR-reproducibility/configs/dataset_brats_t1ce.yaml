name: BraTS 2021 Task 1 T1ce Detection Conversion
task: detection_from_segmentation
format: NIfTI_to_YOLO
source_url: https://www.kaggle.com/datasets/dschettler8845/brats-2021-task1
modality: T1ce
original_modalities:
  - T1
  - T1ce
  - T2
  - T2-FLAIR
segmentation_labels:
  0: background
  1: necrotic tumor core
  2: edema or invaded tissue
  4: enhancing tumor
converted_class:
  0: tumor
patient_count: 1251
converted_tumor_slices: 80021
converted_instances: 80021
patient_level_split:
  train_patients: 876
  val_patients: 125
  test_patients: 250
converted_instances_by_subset:
  train: 56121
  val: 8008
  test: 15892
notes: >
  Labels 1, 2, and 4 were merged into a single tumor mask.
  For each axial slice containing tumor pixels, the minimum bounding
  rectangle of the merged tumor region was generated as one detection box.

