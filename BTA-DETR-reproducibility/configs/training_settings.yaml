input_size: 640
batch_size: 8
epochs: 200
optimizer: AdamW
initial_learning_rate: 0.0001
weight_decay: 0.0001
lr_scheduler: cosine_annealing
augmentation:
  applied_to: training_set_only
  operations:
    - random_horizontal_flip
    - small_angle_rotation
    - random_brightness_contrast
    - gaussian_noise
pretraining:
  policy: same_pretraining_setting_for_compared_detectors
random_seed_policy:
  repeated_runs: 5
  report: mean_and_standard_deviation
hardware:
  cpu: AMD EPYC 7K62 48-Core CPU
  gpu: NVIDIA GeForce RTX 4090
software:
  os: Ubuntu 22.04
  pytorch: 2.2.2
  cuda: 12.1
  cudnn: 8.9.0.2

